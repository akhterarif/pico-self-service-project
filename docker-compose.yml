services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pico
      POSTGRES_USER: pico
      POSTGRES_PASSWORD: pico
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pico"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://pico:pico@postgres:5432/pico
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CELERY_TASK_ALWAYS_EAGER: "0"
      OLLAMA_MODEL: gemma
      OLLAMA_MOCK_MODE: "1"
      # Ensure transformers/HF/Chroma caches persist on the mounted chroma_data volume
      XDG_CACHE_HOME: /data/chroma/cache
      TRANSFORMERS_CACHE: /data/chroma/transformers
      HF_HOME: /data/chroma/hf
      CHROMA_ONNX_DIR: /data/chroma/onnx_models
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["/app/docker/entrypoint.sh"]
    volumes:
      - chroma_data:/data/chroma

  celery:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgres://pico:pico@postgres:5432/pico
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "0"
      OLLAMA_MODEL: gemma
      OLLAMA_MOCK_MODE: "1"
      XDG_CACHE_HOME: /data/chroma/cache
      TRANSFORMERS_CACHE: /data/chroma/transformers
      HF_HOME: /data/chroma/hf
      CHROMA_ONNX_DIR: /data/chroma/onnx_models
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    volumes:
      - chroma_data:/data/chroma

  celery-beat:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgres://pico:pico@postgres:5432/pico
      REDIS_URL: redis://redis:6379/0
      OLLAMA_MODEL: gemma
      OLLAMA_MOCK_MODE: "1"
      XDG_CACHE_HOME: /data/chroma/cache
      TRANSFORMERS_CACHE: /data/chroma/transformers
      HF_HOME: /data/chroma/hf
      CHROMA_ONNX_DIR: /data/chroma/onnx_models
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - postgres
      - redis
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    volumes:
      - chroma_data:/data/chroma

  ollama:
    build:
      context: ./ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Ollama typically exposes a local HTTP API; map to host for frontend/backend access
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
