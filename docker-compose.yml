services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pico
      POSTGRES_USER: pico
      POSTGRES_PASSWORD: pico
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pico"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://pico:pico@postgres:5432/pico
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CELERY_TASK_ALWAYS_EAGER: "0"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["/app/docker/entrypoint.sh"]
    volumes:
      - chroma_data:/data/chroma

  celery:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgres://pico:pico@postgres:5432/pico
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["celery", "-A", "config", "worker", "-l", "info"]

  celery-beat:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgres://pico:pico@postgres:5432/pico
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: ["celery", "-A", "config", "beat", "-l", "info"]

  ollama:
    image: ollama/ollama:latest
    # Ollama typically exposes a local HTTP API; map to host for frontend/backend access
    ports:
      - "11434:11434"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
